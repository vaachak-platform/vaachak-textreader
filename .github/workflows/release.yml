name: Vaachak Release Workflow

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle # Added caching here to speed up release builds!

      - name: Decode Keystore
        env:
          ENCODED_KEYSTORE: ${{ secrets.VAACHAK_KEYSTORE_BASE64 }}
        run: echo $ENCODED_KEYSTORE | base64 --decode > app/vaachak-key.jks

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # Added the gatekeeper test step here!
      - name: Run Unit Tests
        run: ./gradlew testReleaseUnitTest

      - name: Build and Sign Release APK
        env:
          ORG_GRADLE_PROJECT_VAACHAK_KEYSTORE_PASSWORD: ${{ secrets.VAACHAK_KEYSTORE_PASSWORD }}
          ORG_GRADLE_PROJECT_VAACHAK_KEY_ALIAS: ${{ secrets.VAACHAK_KEY_ALIAS }}
          ORG_GRADLE_PROJECT_VAACHAK_KEY_PASSWORD: ${{ secrets.VAACHAK_KEY_PASSWORD }}
        run: ./gradlew assembleRelease

      - name: Debug Output Directory
        run: ls -la app/build/outputs/apk/release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/*.apk
          generate_release_notes: true