name: Vaachak Release Workflow

on:
  push:
    tags:
      - 'v*'

# 1. THE PERMISSIONS FIX: This grants the workflow the right to create a Release
permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Decode Keystore
        env:
          ENCODED_KEYSTORE: ${{ secrets.VAACHAK_KEYSTORE_BASE64 }}
        run: echo $ENCODED_KEYSTORE | base64 --decode > app/vaachak-key.jks

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build and Sign Release APK
        env:
          ORG_GRADLE_PROJECT_VAACHAK_KEYSTORE_PASSWORD: ${{ secrets.VAACHAK_KEYSTORE_PASSWORD }}
          ORG_GRADLE_PROJECT_VAACHAK_KEY_ALIAS: ${{ secrets.VAACHAK_KEY_ALIAS }}
          ORG_GRADLE_PROJECT_VAACHAK_KEY_PASSWORD: ${{ secrets.VAACHAK_KEY_PASSWORD }}
        run: ./gradlew assembleRelease

      # 2. THE PATH FIX: List the directory just so we can see what Gradle did in the logs
      - name: Debug Output Directory
        run: ls -la app/build/outputs/apk/release/

      # 3. THE WILDCARD FIX: Grab any .apk file in the folder
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/*.apk
          generate_release_notes: true