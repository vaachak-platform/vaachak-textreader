name: Vaachak Release Workflow

# Triggers when you push a tag like "v1.0.0"
on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 1. Recreate the vaachak-key.jks file from a Base64 secret
      - name: Decode Keystore
        env:
          ENCODED_KEYSTORE: ${{ secrets.VAACHAK_KEYSTORE_BASE64 }}
        run: echo $ENCODED_KEYSTORE | base64 --decode > app/vaachak-key.jks

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 2. Build the app while passing your environment variables
      - name: Build and Sign Release APK
        env:
          ORG_GRADLE_PROJECT_VAACHAK_KEYSTORE_PASSWORD: ${{ secrets.VAACHAK_KEYSTORE_PASSWORD }}
          ORG_GRADLE_PROJECT_VAACHAK_KEY_ALIAS: ${{ secrets.VAACHAK_KEY_ALIAS }}
          ORG_GRADLE_PROJECT_VAACHAK_KEY_PASSWORD: ${{ secrets.VAACHAK_KEY_PASSWORD }}
        run: ./gradlew assembleRelease

      # 3. Grab the natively signed APK and rename it
      - name: Rename Signed APK
        run: mv app/build/outputs/apk/release/app-release.apk Vaachak-TextReader.apk

      # 4. Publish it to the GitHub Releases page
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
            files: app/build/outputs/apk/release/Vaachak-TextReader.apk
            generate_release_notes: true